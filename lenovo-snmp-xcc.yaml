zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 0835b2a34e4a43d6887f5887b0135acc
      name: 'Templates/Servers Hardware'
  templates:
    - uuid: 6c2534a531744910938a4d2b573600b7
      template: 'Lenovo XCC SNMPv3'
      name: 'Lenovo XCC SNMPv3'
      description: |
        Zabbix template for Lenovo server monitoring via SNMP v3.
        
        GitHub: https://github.com/ku4eto/zabbix-template-lenovo-snmp-xcc
        
        It required Linux by SNMP template before importing this template.
        
        Modified: split "Physical Disk Discovery" (LENOVO-XCC-MIB::diskTable, 0-based index,
        health status only - diskFruName is just a generic "Drive N" label, not real VPD data)
        from a new "RAID Drive Discovery" rule (LENOVO-XCC-MIB::raidDriveTable, 1-based index,
        used for real part number / serial / capacity / media type / remaining life on drives
        behind a RAID controller). These two tables use independent, non-aligned index spaces
        on Lenovo XCC and must not share a single discovery rule's LLD macro.
      vendor:
        name: 'https://github.com/ku4eto/zabbix-template-lenovo-snmp-xcc'
        version: '1.1'
      groups:
        - name: 'Templates/Servers Hardware'
      items:
        - uuid: 96a2c78c5bfa47bf8a7ea239791832ff
          name: 'Power Status'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.1.0
          key: currentSysPowerStatus
          history: 2d
          trends: 5d
          valuemap:
            name: currentSysPowerStatus
        - uuid: 96f8b1c175ef46ceb4e6ff67b5e86280
          name: 'Fan Table Row Count (XCC-reported bays)'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.3.1.0
          key: fan.total
          history: 2d
          trends: 5d
          description: |
            LENOVO-XCC-MIB::fanNumber
            "The present number of rows in the fan table." This is NOT the number
            of physically installed fans - the XCC reports one row per fan BAY the
            chassis supports, even if a bay is empty (that row's fanHealthStatus
            will read "Unknown" and fanSpeed "offline"). See "Fans Physically
            Installed" for the actual installed count.
        - uuid: fe169e19a7a24a35bfdee639030956a1
          name: 'Fans Physically Installed'
          type: CALCULATED
          key: fan.installed.count
          params: 'count(/Lenovo XCC SNMPv3/fanhealth[*],#1,"ne","Unknown")'
          delay: 1m
          history: 2d
          trends: 30d
          value_type: UNSIGNED
          description: |
            Counts fan bays whose LENOVO-XCC-MIB::fanHealthStatus is anything
            other than "Unknown". On this hardware an empty bay reports
            "Unknown"/fanSpeed "offline", so this reflects fans actually seated
            (Normal, Warning, or Critical all count as installed) rather than the
            raw row count from "Fan Table Row Count".
          triggers:
            - uuid: 1b6d4bfe036b44ee918e61013c653f2e
              expression: 'last(/Lenovo XCC SNMPv3/fan.installed.count)<{$FAN_MIN_COUNT}'
              name: 'Fewer fans installed than expected ({ITEM.LASTVALUE})'
              priority: WARNING
              description: |
                Fewer fan bays report a non-"Unknown" health status than
                {$FAN_MIN_COUNT} (the expected count for this system). This can
                mean a fan was physically removed, or its tach sensor stopped
                reporting entirely. Override {$FAN_MIN_COUNT} at the host level
                if this server's fan population differs from the default.
              manual_close: 'YES'
        - uuid: cb1d5e9f271e4fca9eae3e0f1ed5e0d7
          name: 'Current System PowerStatus'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.1.0
          key: IMMcurrentSysPowerStatus
          delay: '300'
          history: 2d
          trends: 5d
          valuemap:
            name: 'IMM-MIB::systemHealthStat'
        - uuid: b1d30d1931a44a6d9baf45792d19715d
          name: 'System State'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.4.0
          key: IMMsystemState
          delay: '300'
          history: 2d
          trends: 5d
          valuemap:
            name: systemState
        - uuid: 882191ec797a4c0da8db242a5120cb35
          name: 'Machine Model'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.2.0
          key: machinemodel
          delay: 1h
          history: 2d
          value_type: TEXT
          trends: '0'
          tags:
            - tag: Application
              value: hardware
        - uuid: e65f9b45f79c424182111c6532a9f792
          name: 'Machine Name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.5.0
          key: machinename
          delay: 1h
          history: 2d
          value_type: TEXT
          trends: '0'
          tags:
            - tag: Application
              value: hardware
        - uuid: 8ea7d8ba65294108b6ac794ca2d370b5
          name: 'Machine Serial Number'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.3.0
          key: machinesrno
          delay: 1h
          history: 2d
          value_type: TEXT
          trends: '0'
          tags:
            - tag: Application
              value: hardware
        - uuid: 2a166c480a8044619342c3fe0f499ee6
          name: 'Machine Type'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.1.0
          key: machinetype
          delay: 1h
          history: 2d
          value_type: TEXT
          trends: '0'
          tags:
            - tag: Application
              value: hardware
        - uuid: 06fdaea651c341beac5dcf7bba3ee15d
          name: 'Total power available'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.10.1.9.0
          key: power.available
          delay: 120s
          history: 7d
          units: W
          description: |
            LENOVO-XCC-MIB::fuelGaugeTotalPowerAvailable
            Calculated total remaining power available. Rack system only.
        - uuid: 9b4744eaa29b4ac6b6274ef0796afe09
          name: 'CPU power consumption'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.10.1.11.0
          key: power.consumption.cpu
          delay: 120s
          history: 7d
          units: W
          description: 'LENOVO-XCC-MIB::fuelGaugePowerConsumptionCpu'
        - uuid: 93de8e612515441e9beab6b06f03efd5
          name: 'Memory power consumption'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.10.1.12.0
          key: power.consumption.memory
          delay: 120s
          history: 7d
          units: W
          description: 'LENOVO-XCC-MIB::fuelGaugePowerConsumptionMemory'
        - uuid: 95c5aca17fa940ffa1fc09155d2e798b
          name: 'Total power in use'
          type: SNMP_AGENT
          snmp_oid: 'LENOVO-XCC-MIB::fuelGaugeTotalPowerInUse.0'
          key: power.inuse
          delay: 120s
          history: 7d
          units: W
        - uuid: 030a29b2e3ce45cdb14d565f13dcbecc
          name: 'Power On Hours'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.2.0
          key: powerOnHours
          history: 2d
          trends: 5d
          units: uptime
        - uuid: 3214bd7f52304db9b94b84aded713326
          name: 'RAID ODBC Capable'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.13.1.1.0
          key: raidoobcapable
          history: 2d
          trends: 5d
          description: 'If raidOOBCapable is disabled, all the RAID information is not available.'
          valuemap:
            name: raidoobcapable
        - uuid: a6c62ffc8426473aa97e4e5a99d8e43d
          name: Trap
          type: SNMP_TRAP
          key: 'snmptrap["General"]'
          delay: '0'
          history: 90d
          value_type: LOG
          trends: '0'
          logtimefmt: 'hh:mm:ss yyyy/MM/dd'
          tags:
            - tag: Application
              value: Status
        - uuid: f7077bca9ec042e488fbdc49fd4ae1fd
          name: 'Overall System Health Status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.4.1.0
          key: system.health.overall
          delay: 60s
          history: 7d
          trends: 90d
          description: |
            LENOVO-XCC-MIB::systemHealthStat
            Rolled-up health status for the whole system as reported by the XCC.
            nonRecoverable/critical indicate an active hardware problem; see the
            "Health Summary" discovered items for the specific reason(s).
          valuemap:
            name: 'IMM-MIB::systemHealthStat'
          tags:
            - tag: Application
              value: hardware
          triggers:
            - uuid: b173b62d0d4e4699ae832147ae36da2c
              expression: 'count(/Lenovo XCC SNMPv3/system.health.overall,#1,"eq",2)=1'
              name: 'Overall system health is CRITICAL'
              priority: HIGH
              description: 'The XCC reports the overall system health as critical. Check the Health Summary discovered items for the specific reason(s).'
              manual_close: 'YES'
            - uuid: 88a533a31a4e4957a5a37216d562591c
              expression: 'count(/Lenovo XCC SNMPv3/system.health.overall,#1,"eq",4)=1'
              name: 'Overall system health is non-critical (warning)'
              priority: WARNING
              description: 'The XCC reports a condition that may affect the system in the future but it is currently working properly.'
              manual_close: 'YES'
              dependencies:
                - name: 'Overall system health is CRITICAL'
                  expression: 'count(/Lenovo XCC SNMPv3/system.health.overall,#1,"eq",2)=1'
                - name: 'Overall system health is NON-RECOVERABLE'
                  expression: 'count(/Lenovo XCC SNMPv3/system.health.overall,#1,"eq",0)=1'
            - uuid: 7dff2550d3ac4ac1909e3b498adc669a
              expression: 'count(/Lenovo XCC SNMPv3/system.health.overall,#1,"eq",0)=1'
              name: 'Overall system health is NON-RECOVERABLE'
              priority: DISASTER
              description: 'The XCC reports a non-recoverable hardware error. The system may not be functioning.'
              manual_close: 'YES'
        - uuid: 32b09c0aa022465ba5d5355fbbf6830c
          name: 'Restart Count'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.3.0
          key: XCCrestartCount
          history: 2d
          trends: 5d
      discovery_rules:
        - uuid: 30f0d0edd5c140e4ab45946b5c5f21d3
          name: 'Fan Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#FANINDEX},1.3.6.1.4.1.19046.11.1.1.3.2.1.1]'
          key: fan.discovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 2375665078824f76893597040f4cbf5e
              name: 'Fan {#FANINDEX} Health'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.3.2.1.10.{#FANINDEX}'
              key: 'fanhealth[{#FANINDEX}]'
              history: 2d
              value_type: TEXT
              trends: '0'
              description: 'A description of the fan component status.'
              tags:
                - tag: hardware
                  value: fan
                - tag: hardware
                  value: health
              trigger_prototypes:
                - uuid: 71fa15912c30459f8f2e1aaedd687484
                  expression: 'find(/Lenovo XCC SNMPv3/fanhealth[{#FANINDEX}],,,"Normal")=0 and find(/Lenovo XCC SNMPv3/fanhealth[{#FANINDEX}],,,"Unknown")=0'
                  name: 'Fan {#FANINDEX} Health'
                  priority: WARNING
                  description: |
                    Fires only when the fan reports a genuine non-Normal status
                    (e.g. Warning/Critical). "Unknown" is excluded because on this
                    hardware an empty/unpopulated fan bay reports "Unknown" rather
                    than a fault - see "Fans Physically Installed" for tracking
                    actual fan population instead.
                  manual_close: 'YES'
            - uuid: d4d558c7ed154ef0bf901d0667591265
              name: 'Fan {#FANINDEX} Speed in percentage'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.3.2.1.3.{#FANINDEX}'
              key: 'fanspeed[{#FANINDEX}]'
              history: 2d
              value_type: TEXT
              trends: '0'
              description: 'Fan  speed expressed in percent(%) of maximum RPM. An octet string expressed as ''ddd% of maximum'' where: d is a decimal digit or blank space for a leading zero. If the fan is determined not to be running or the fan speed cannot be determined, the string will indicate ''Offline''.'
              tags:
                - tag: hardware
                  value: fan
            - uuid: f222488596af4f86bb241c916c7c362b
              name: 'Fan {#FANINDEX} Description'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.3.2.1.2.{#FANINDEX}'
              key: 'fan[{#FANINDEX}]'
              history: 2d
              value_type: TEXT
              trends: '0'
              tags:
                - tag: hardware
                  value: fan
        - uuid: 0110f8bba9dd4ed382326a2bbce101a2
          name: 'Firmware Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#FIRMINDEX},1.3.6.1.4.1.19046.11.1.1.5.1.1.1,{#FIRMTYPE},1.3.6.1.4.1.19046.11.1.1.5.1.1.2]'
          key: firmwarediscovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: d2791b4937754f75be0ff0a7b48e64b2
              name: 'Release Date: {#FIRMTYPE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.5.1.1.4.{#FIRMINDEX}'
              key: 'reldate[{#FIRMINDEX}]'
              history: 90d
              value_type: TEXT
              trends: '0'
              tags:
                - tag: Application
                  value: Firmware
            - uuid: 7b8bea07b1ae47bd9fd275cedd94a2dd
              name: 'Version: {#FIRMTYPE}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.5.1.1.3.{#FIRMINDEX}'
              key: 'version[{#FIRMINDEX}]'
              history: 90d
              value_type: TEXT
              trends: '0'
              tags:
                - tag: Application
                  value: Firmware
        - uuid: b00e7b3a6f374627979af4db027d01e9
          name: 'System Health Summary Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.19046.11.1.1.4.2.1.1]'
          key: healthsummary.discovery
          delay: 1h
          lifetime: 1h
          enabled_lifetime_type: DISABLE_NEVER
          description: |
            LENOVO-XCC-MIB::systemHealthSummaryTable
            Detailed reasons behind the "Overall System Health Status" item. This
            table is only populated while there is an active health issue, so a
            short lifetime is used to age out resolved entries quickly. Severity
            text vocabulary (e.g. "Critical"/"Warning") is matched loosely since
            it isn't formally enumerated in the MIB.
          item_prototypes:
            - uuid: fd3ebdae0a4b45d88092229a1b9a2245
              name: '{#SNMPINDEX}: Health summary description'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.4.2.1.3.{#SNMPINDEX}'
              key: 'healthsummary.description[systemHealthSummaryDescription.{#SNMPINDEX}]'
              history: 7d
              value_type: CHAR
              trends: '0'
              description: 'LENOVO-XCC-MIB::systemHealthSummaryDescription'
              tags:
                - tag: Application
                  value: 'Health Summary'
            - uuid: 9bf812340c7e4f3498201b662f4c4b8f
              name: '{#SNMPINDEX}: Health summary severity'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.4.2.1.2.{#SNMPINDEX}'
              key: 'healthsummary.severity[systemHealthSummarySeverity.{#SNMPINDEX}]'
              history: 7d
              value_type: CHAR
              trends: '0'
              description: 'LENOVO-XCC-MIB::systemHealthSummarySeverity'
              tags:
                - tag: Application
                  value: 'Health Summary'
          trigger_prototypes:
            - uuid: 505223dbd620462d8a77968b02e447ea
              expression: 'find(/Lenovo XCC SNMPv3/healthsummary.severity[systemHealthSummarySeverity.{#SNMPINDEX}],,"like","Warning")=1 and length(last(/Lenovo XCC SNMPv3/healthsummary.description[systemHealthSummaryDescription.{#SNMPINDEX}]))>=0'
              name: '{#SNMPINDEX}: Health summary reports a warning - {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'See the paired "Health summary description" item ({ITEM.LASTVALUE2}) for details.'
              manual_close: 'YES'
              dependencies:
                - name: '{#SNMPINDEX}: Health summary reports CRITICAL - {ITEM.LASTVALUE2}'
                  expression: 'find(/Lenovo XCC SNMPv3/healthsummary.severity[systemHealthSummarySeverity.{#SNMPINDEX}],,"like","Critical")=1 and length(last(/Lenovo XCC SNMPv3/healthsummary.description[systemHealthSummaryDescription.{#SNMPINDEX}]))>=0'
            - uuid: 5ce6ff1361c94d18b6ca5eb4bf41205e
              expression: 'find(/Lenovo XCC SNMPv3/healthsummary.severity[systemHealthSummarySeverity.{#SNMPINDEX}],,"like","Critical")=1 and length(last(/Lenovo XCC SNMPv3/healthsummary.description[systemHealthSummaryDescription.{#SNMPINDEX}]))>=0'
              name: '{#SNMPINDEX}: Health summary reports CRITICAL - {ITEM.LASTVALUE2}'
              priority: HIGH
              description: 'See the paired "Health summary description" item ({ITEM.LASTVALUE2}) for details.'
              manual_close: 'YES'
        - uuid: d6811a3b06304ff78fe7c2caaa847439
          name: 'LED Status Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#LEDINDEX},1.3.6.1.4.1.19046.11.1.1.8.2.1.1,{#LEDLABEL},1.3.6.1.4.1.19046.11.1.1.8.2.1.4]'
          key: leddiscovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 9ac40e37696844e89f93080eaed61c58
              name: 'LED Color: {#LEDLABEL}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.8.2.1.6.{#LEDINDEX}'
              key: 'ledcolor[{#LEDINDEX}]'
              history: 2d
              value_type: TEXT
              trends: '0'
            - uuid: 8816bdbd845f4d2ebd336ea61918374a
              name: 'LED State: {#LEDLABEL}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.8.2.1.5.{#LEDINDEX}'
              key: 'ledstate[{#LEDINDEX}]'
              history: 2d
              trends: 5d
              valuemap:
                name: ledstate
        - uuid: bf3327737d6845d6b40061fe667330c2
          name: 'Memory module Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#MEMINDEX},1.3.6.1.4.1.19046.11.1.1.5.21.1.1,{#MEMDISC},1.3.6.1.4.1.19046.11.1.1.5.21.1.2,{#MEMTYPE},1.3.6.1.4.1.19046.11.1.1.5.21.1.6]'
          key: memorydiscovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 306540cf6f704b85b484afba0ca153d8
              name: '{#MEMDISC} ({#MEMTYPE}) DIMM Type'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.5.21.1.6.{#MEMINDEX}'
              key: 'memdimmtype[{#MEMINDEX}]'
              delay: 1h
              history: 30d
              value_type: CHAR
              trends: '0'
              description: 'LENOVO-XCC-MIB::memoryVpdType'
              tags:
                - tag: hardware
                  value: memory
            - uuid: f7e30266c79041bca2f2a2979146fd71
              name: '{#MEMDISC} ({#MEMTYPE}) PartNumber'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.5.21.1.11.{#MEMINDEX}'
              key: 'mempartno[{#MEMINDEX}]'
              history: 2d
              value_type: TEXT
              trends: '0'
              tags:
                - tag: hardware
                  value: memory
            - uuid: 1719a9156e9b4393931774545ac2c171
              name: '{#MEMDISC} ({#MEMTYPE}) Rated Speed(MHz)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.5.21.1.10.{#MEMINDEX}'
              key: 'memratedspeed[{#MEMINDEX}]'
              delay: 1h
              history: 2d
              trends: 30d
              units: '!MHz'
              description: 'LENOVO-XCC-MIB::memoryRatedSpeed'
              tags:
                - tag: hardware
                  value: memory
            - uuid: b5089d94c83e4a21a594fc106ffcf136
              name: '{#MEMDISC} ({#MEMTYPE}) Serial'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.5.21.1.4.{#MEMINDEX}'
              key: 'memserial[{#MEMINDEX}]'
              history: 2d
              value_type: TEXT
              trends: '0'
              tags:
                - tag: hardware
                  value: memory
            - uuid: ed004f1dd8584171843d763cd54ad4db
              name: '{#MEMDISC} ({#MEMTYPE}) Size(GB)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.5.21.1.7.{#MEMINDEX}'
              key: 'memsize[{#MEMINDEX}]'
              history: 2d
              trends: 5d
              units: '!GB'
              tags:
                - tag: hardware
                  value: memory
            - uuid: 49f837e86c4c49e697fe58de16426ad2
              name: '{#MEMDISC} ({#MEMTYPE}) Speed(MHz)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.5.21.1.9.{#MEMINDEX}'
              key: 'memspeed[{#MEMINDEX}]'
              history: 2d
              trends: 5d
              units: '!MHz'
              tags:
                - tag: hardware
                  value: memory
            - uuid: a7864055468d4baf93ed5f6eab65ec38
              name: '{#MEMDISC} ({#MEMTYPE}) Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.5.21.1.8.{#MEMINDEX}'
              key: 'memstatus[{#MEMINDEX}]'
              history: 2d
              value_type: TEXT
              trends: '0'
              tags:
                - tag: hardware
                  value: memory
              trigger_prototypes:
                - uuid: dd5e936e770b4dd39a45374c031a7161
                  expression: 'find(/Lenovo XCC SNMPv3/memstatus[{#MEMINDEX}],,,"Normal")=0'
                  name: '{#MEMDISC} ({#MEMTYPE}) Status'
                  priority: WARNING
                  manual_close: 'YES'
        - uuid: 08fb31caf1304c2dac559dfb1c992d43
          name: 'Network card Discovery'
          type: SNMP_AGENT
