                  recovery_expression: 'avg(/Lenovo XCC SNMPv3/sensor.temp.value[{#SNMPINDEX}],5m)>{$TEMP_CRIT_LOW:""}+3'
                  name: '{#SNMPVALUE}: Temperature is too low: <{$TEMP_CRIT_LOW:""}'
                  priority: AVERAGE
                  description: 'Last value: {ITEM.LASTVALUE1}.'
